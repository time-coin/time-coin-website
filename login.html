<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — TIME Coin Masternode Portal</title>
    <meta name="description" content="Sign in to the TIME Coin Masternode Portal to submit and manage your nodes.">
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body { padding-top: 0; }

        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo a {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .auth-logo img {
            width: 48px;
            height: 48px;
            filter: invert(1);
        }

        .auth-logo .logo-text {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo .portal-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-tab.active {
            color: var(--primary-purple);
            border-bottom-color: var(--primary-purple);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 7px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary-purple);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn-primary-full {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 6px;
        }

        .btn-primary-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-primary-full:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 13px;
            margin: 18px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-google {
            width: 100%;
            padding: 11px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .error-msg {
            display: none;
            font-size: 13px;
            color: var(--danger-red);
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            padding: 9px 12px;
            margin-bottom: 14px;
        }

        .error-msg.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .back-link a {
            color: var(--primary-purple);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">

            <div class="auth-logo">
                <a href="index.html">
                    <img src="images/logo/time-coin-logo.png" alt="TIME Coin">
                    <span class="logo-text">TIME</span>
                </a>
                <p class="portal-label">Masternode Portal</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
            </div>

            <!-- Sign In Form -->
            <div id="form-signin">
                <div class="error-msg" id="signin-error"></div>
                <div class="form-group">
                    <label for="signin-email">Email Address</label>
                    <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button class="btn-primary-full" id="signin-btn">Sign In</button>
                <div class="divider">or</div>
                <button class="btn-google" id="google-signin-btn">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
                        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
                        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
                        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.31z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>

            <!-- Register Form -->
            <div id="form-register" style="display: none;">
                <div class="error-msg" id="register-error"></div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Min. 8 characters" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" placeholder="••••••••" autocomplete="new-password">
                </div>
                <button class="btn-primary-full" id="register-btn">Create Account</button>
                <div class="divider">or</div>
                <button class="btn-google" id="google-register-btn">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
                        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
                        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
                        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.31z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to TIME Coin</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import {
            getAuth,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged
        } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        // ================================================================
        // FIREBASE CONFIG
        // 1. Go to https://console.firebase.google.com
        // 2. Create a project → Add a web app
        // 3. Enable Authentication → Email/Password and Google
        // 4. Paste your config values below
        // ================================================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // Redirect if already signed in
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'dashboard.html';
        });

        // Tab switching
        window.switchTab = function(tab) {
            const isSignIn = tab === 'signin';
            document.getElementById('form-signin').style.display = isSignIn ? 'block' : 'none';
            document.getElementById('form-register').style.display = isSignIn ? 'none' : 'block';
            document.getElementById('tab-signin').classList.toggle('active', isSignIn);
            document.getElementById('tab-register').classList.toggle('active', !isSignIn);
        };

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
        }

        function clearErrors() {
            ['signin-error', 'register-error'].forEach(id => {
                document.getElementById(id).classList.remove('show');
            });
        }

        function setLoading(btnId, loading, defaultText) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.textContent = loading ? 'Please wait...' : defaultText;
        }

        const AUTH_ERRORS = {
            'auth/user-not-found': 'No account found with this email.',
            'auth/wrong-password': 'Incorrect password.',
            'auth/invalid-credential': 'Incorrect email or password.',
            'auth/invalid-email': 'Invalid email address.',
            'auth/too-many-requests': 'Too many attempts. Please try again later.',
            'auth/email-already-in-use': 'An account with this email already exists.',
            'auth/weak-password': 'Password must be at least 8 characters.',
        };

        // Sign In
        document.getElementById('signin-btn').addEventListener('click', async () => {
            clearErrors();
            const email = document.getElementById('signin-email').value.trim();
            const password = document.getElementById('signin-password').value;
            if (!email || !password) { showError('signin-error', 'Please fill in all fields.'); return; }

            setLoading('signin-btn', true, 'Sign In');
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                setLoading('signin-btn', false, 'Sign In');
                showError('signin-error', AUTH_ERRORS[err.code] || 'Sign in failed. Please try again.');
            }
        });

        // Register
        document.getElementById('register-btn').addEventListener('click', async () => {
            clearErrors();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            if (!email || !password || !confirm) { showError('register-error', 'Please fill in all fields.'); return; }
            if (password.length < 8) { showError('register-error', 'Password must be at least 8 characters.'); return; }
            if (password !== confirm) { showError('register-error', 'Passwords do not match.'); return; }

            setLoading('register-btn', true, 'Create Account');
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                setLoading('register-btn', false, 'Create Account');
                showError('register-error', AUTH_ERRORS[err.code] || 'Registration failed. Please try again.');
            }
        });

        // Google Sign In (both buttons)
        async function handleGoogle() {
            try {
                await signInWithPopup(auth, googleProvider);
                window.location.href = 'dashboard.html';
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    showError('signin-error', 'Google sign-in failed. Please try again.');
                    document.getElementById('signin-error').classList.add('show');
                }
            }
        }

        document.getElementById('google-signin-btn').addEventListener('click', handleGoogle);
        document.getElementById('google-register-btn').addEventListener('click', handleGoogle);

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const signinVisible = document.getElementById('form-signin').style.display !== 'none';
            if (signinVisible) document.getElementById('signin-btn').click();
            else document.getElementById('register-btn').click();
        });
    </script>
</body>
</html>
