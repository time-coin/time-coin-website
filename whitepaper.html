<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME Coin - Overview Whitepaper v4.0</title>

    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/whitepaper-print.css" media="print">

    <!-- marked.js — markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

    <!-- html2pdf.js — on-the-fly PDF generation -->
    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

    <!-- Header/Footer Includes -->
    <script src="js/config.js"></script>
    <script src="js/includes.js" defer></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            background-attachment: fixed;
            color: #ffffff;
            padding-top: 110px;
        }

        /* ── Loading / error states ── */
        .wp-loading, .wp-error {
            text-align: center;
            padding: 6rem 2rem;
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .wp-error { color: #f87171; }

        /* ── Outer wrapper ── */
        .whitepaper-wrapper {
            max-width: 960px;
            margin: 60px auto 80px;
            padding: 0 20px;
        }

        /* ── Top bar ── */
        .wp-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #667eea;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #a78bfa; }

        .wp-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

        .btn-sm {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-primary-sm {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary-sm:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }
        .btn-outline-sm {
            background: transparent;
            color: #667eea;
            border: 1px solid #667eea;
        }
        .btn-outline-sm:hover { background: rgba(102,126,234,0.1); }

        /* ── Rendered markdown container ── */
        #wp-content {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 52px 56px;
        }

        @media (max-width: 640px) {
            #wp-content { padding: 28px 20px; }
        }

        /* ── Markdown element styles ── */
        #wp-content h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #667eea, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
            line-height: 1.2;
        }

        #wp-content h2 {
            font-size: 1.9rem;
            color: #ffffff;
            margin-top: 3.5rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(102,126,234,0.35);
        }

        #wp-content h3 {
            font-size: 1.35rem;
            color: #e2e8f0;
            margin-top: 2.25rem;
            margin-bottom: 0.85rem;
        }

        #wp-content h4 {
            font-size: 1.05rem;
            color: #cbd5e1;
            margin-top: 1.5rem;
            margin-bottom: 0.6rem;
        }

        #wp-content p {
            line-height: 1.9;
            margin-bottom: 1.1rem;
            color: #cbd5e1;
        }

        /* Sub-title / meta lines right after h1 */
        #wp-content h1 + p,
        #wp-content h1 + p + p {
            color: #64748b;
            font-style: italic;
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }

        #wp-content ul,
        #wp-content ol {
            margin-bottom: 1rem;
            padding-left: 1.75rem;
            color: #cbd5e1;
        }

        #wp-content li {
            margin-bottom: 0.5rem;
            line-height: 1.75;
        }

        /* Tables */
        #wp-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            overflow: hidden;
            font-size: 0.93rem;
        }

        #wp-content th,
        #wp-content td {
            padding: 11px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        #wp-content th {
            background: rgba(102,126,234,0.22);
            font-weight: 600;
            color: #ffffff;
        }

        #wp-content tr:last-child td { border-bottom: none; }
        #wp-content tr:hover { background: rgba(255,255,255,0.04); }

        /* Inline code */
        #wp-content code {
            background: rgba(255,255,255,0.1);
            padding: 2px 7px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 0.875em;
            color: #a78bfa;
        }

        /* Code blocks */
        #wp-content pre {
            background: #0d1117;
            border-radius: 10px;
            overflow-x: auto;
            margin: 1.25rem 0;
            border-left: 3px solid #667eea;
            padding: 0;
            position: relative;
        }

        #wp-content pre code {
            background: none;
            padding: 1.25rem 1.5rem;
            display: block;
            color: #e2e8f0;
            font-size: 0.875rem;
            line-height: 1.65;
        }

        /* Blockquotes — used for callouts / info boxes */
        #wp-content blockquote {
            border-left: 4px solid #667eea;
            margin: 1.75rem 0;
            padding: 1rem 1.5rem;
            background: rgba(102,126,234,0.1);
            border-radius: 0 10px 10px 0;
            color: #94a3b8;
        }

        #wp-content blockquote p {
            margin: 0;
            color: #94a3b8;
        }

        #wp-content blockquote strong {
            color: #60a5fa;
        }

        /* Horizontal rules */
        #wp-content hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 3rem 0;
        }

        /* Copy button */
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            user-select: none;
            line-height: 1.4;
        }
        .copy-btn:hover { background: rgba(102,126,234,0.25); color: #e2e8f0; border-color: #667eea; }
        .copy-btn.copied { color: #34d399; border-color: #34d399; background: rgba(52,211,153,0.1); }

        /* Links */
        #wp-content a {
            color: #667eea;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.2s;
        }
        #wp-content a:hover { color: #a78bfa; }

        /* Strong / em */
        #wp-content strong { color: #e2e8f0; }
        #wp-content em { color: #a78bfa; font-style: normal; }

        /* ── Sidebar TOC on wide screens ── */
        @media (min-width: 1300px) {
            .whitepaper-wrapper {
                max-width: 1240px;
                display: grid;
                grid-template-columns: 1fr 260px;
                grid-template-rows: auto 1fr;
                gap: 0 2.5rem;
                align-items: start;
            }
            .wp-topbar { grid-column: 1 / -1; }
            #wp-content { grid-column: 1; }
            #wp-toc { grid-column: 2; grid-row: 2; display: block; }
        }

        #wp-toc {
            display: none;
            position: sticky;
            top: 120px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            font-size: 0.82rem;
            max-height: calc(100vh - 150px);
            overflow-y: auto;
        }

        #wp-toc h4 {
            color: #a78bfa;
            margin: 0 0 0.8rem;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #wp-toc ul { list-style: none; padding: 0; margin: 0; }
        #wp-toc li { margin-bottom: 0.38rem; }
        #wp-toc li.toc-h3 { padding-left: 0.9rem; }
        #wp-toc a { color: #64748b; text-decoration: none; line-height: 1.5; transition: color 0.2s; }
        #wp-toc a:hover, #wp-toc a.active { color: #a78bfa; }

        /* ── Generating indicator ── */
        #pdf-generating {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,12,41,0.85);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            color: #e2e8f0;
            font-size: 1.1rem;
        }
        #pdf-generating.visible { display: flex; }
        .pdf-spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── PDF export — light mode applied during html2pdf capture ── */
        body.pdf-export { background: #ffffff !important; }

        body.pdf-export #wp-content {
            background: #ffffff !important;
            border: none !important;
            border-radius: 0 !important;
            backdrop-filter: none !important;
            padding: 0 !important;
            color: #111 !important;
        }

        body.pdf-export #wp-content h1 {
            background: none !important;
            -webkit-text-fill-color: #111 !important;
            color: #111 !important;
            font-size: 2rem !important;
        }

        body.pdf-export #wp-content h2 {
            color: #111 !important;
            border-bottom-color: #333 !important;
        }

        body.pdf-export #wp-content h3,
        body.pdf-export #wp-content h4 { color: #222 !important; }

        body.pdf-export #wp-content p,
        body.pdf-export #wp-content li,
        body.pdf-export #wp-content td,
        body.pdf-export #wp-content th { color: #222 !important; }

        body.pdf-export #wp-content strong { color: #111 !important; }
        body.pdf-export #wp-content em { color: #333 !important; }

        body.pdf-export #wp-content table {
            background: #f8f8f8 !important;
        }

        body.pdf-export #wp-content th {
            background: #e5e7eb !important;
            color: #111 !important;
        }

        body.pdf-export #wp-content tr:hover { background: transparent !important; }

        body.pdf-export #wp-content blockquote {
            background: #f0f4ff !important;
            border-left-color: #667eea !important;
        }

        body.pdf-export #wp-content blockquote p,
        body.pdf-export #wp-content blockquote strong { color: #334 !important; }

        body.pdf-export #wp-content code {
            background: #f5f5f5 !important;
            color: #6730ec !important;
        }

        body.pdf-export #wp-content pre {
            background: #f5f5f5 !important;
            border-left-color: #667eea !important;
        }

        body.pdf-export #wp-content pre code { color: #222 !important; }

        body.pdf-export #wp-content a { color: #4f46e5 !important; }

        body.pdf-export #wp-content hr { border-top-color: #ccc !important; }

        /* ── Print media ── */
        @media print {
            body { background: white !important; color: black !important; padding-top: 0; }
            .wp-topbar, nav, footer, #wp-toc, #pdf-generating { display: none !important; }
            #wp-content {
                background: white !important;
                border: none !important;
                padding: 0 !important;
                border-radius: 0 !important;
            }
            #wp-content h1 {
                background: none !important;
                -webkit-text-fill-color: black !important;
                color: black !important;
            }
            #wp-content * { color: black !important; -webkit-text-fill-color: black !important; }
            #wp-content pre, #wp-content code { background: #f5f5f5 !important; }
        }
    </style>
</head>
<body>
    <!-- Header injected by includes.js -->

    <!-- PDF generating overlay -->
    <div id="pdf-generating">
        <div class="pdf-spinner"></div>
        <span>Generating PDF&hellip;</span>
    </div>

    <div class="whitepaper-wrapper">

        <!-- Top bar -->
        <div class="wp-topbar">
            <a href="index.html" class="back-link">&#8592; Back to Home</a>
            <div class="wp-actions">
                <a href="technical-whitepaper.html" class="btn-sm btn-outline-sm">
                    &#128300; Technical Whitepaper
                </a>
                <button onclick="window.print()" class="btn-sm btn-outline-sm">
                    &#128424; Print
                </button>
                <button id="btn-download-pdf" class="btn-sm btn-primary-sm">
                    &#11015; Download PDF
                </button>
            </div>
        </div>

        <!-- Sidebar TOC (wide screens) -->
        <aside id="wp-toc">
            <h4>Contents</h4>
            <ul id="wp-toc-list"></ul>
        </aside>

        <!-- Markdown renders here -->
        <main id="wp-content">
            <div class="wp-loading">&#8987; Loading&hellip;</div>
        </main>

    </div>

    <!-- Footer injected by includes.js -->

    <script>
    (function () {

        /* ── Configure marked ── */
        marked.use({
            renderer: (() => {
                const r = new marked.Renderer();
                r.heading = function ({ text, depth, raw }) {
                    const plain = typeof text === 'string'
                        ? text.replace(/<[^>]*>/g, '')
                        : (raw || '').replace(/^#+\s+/, '').trimEnd();
                    const slug = plain.toLowerCase()
                        .replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-');
                    return `<h${depth} id="${slug}">${text ?? plain}</h${depth}>\n`;
                };
                return r;
            })(),
            gfm: true,
            breaks: false,
        });

        /* ── Copy buttons ── */
        function addCopyButtons(scope) {
            (scope || document).querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'Copy';
                btn.addEventListener('click', () => {
                    const code = pre.querySelector('code');
                    navigator.clipboard.writeText(code ? code.innerText : pre.innerText).then(() => {
                        btn.textContent = 'Copied!';
                        btn.classList.add('copied');
                        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
                    });
                });
                pre.appendChild(btn);
            });
        }

        /* ── Load & render markdown ── */
        const content = document.getElementById('wp-content');

        fetch('OVERVIEW.md')
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
            .then(md => {
                content.innerHTML = marked.parse(md);
                addCopyButtons(content);
                buildTOC(content);
                initScrollSpy();
            })
            .catch(err => {
                content.innerHTML =
                    '<div class="wp-error">&#10060; Could not load whitepaper: ' + err.message + '</div>';
            });

        /* ── Sidebar TOC ── */
        function buildTOC(container) {
            const list = document.getElementById('wp-toc-list');
            if (!list) return;
            container.querySelectorAll('h2, h3').forEach(h => {
                const li = document.createElement('li');
                li.className = h.tagName === 'H3' ? 'toc-h3' : '';
                const a = document.createElement('a');
                a.href = '#' + h.id;
                a.textContent = h.textContent;
                a.addEventListener('click', e => {
                    e.preventDefault();
                    h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                li.appendChild(a);
                list.appendChild(li);
            });
        }

        /* ── Scroll spy ── */
        function initScrollSpy() {
            const links = document.querySelectorAll('#wp-toc-list a');
            if (!links.length) return;
            const io = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        links.forEach(l => l.classList.remove('active'));
                        const a = document.querySelector(
                            '#wp-toc-list a[href="#' + e.target.id + '"]');
                        if (a) a.classList.add('active');
                    }
                });
            }, { rootMargin: '-10% 0px -80% 0px' });
            document.querySelectorAll('#wp-content h2, #wp-content h3').forEach(h => io.observe(h));
        }

        /* ── PDF Download via html2pdf.js ── */
        document.getElementById('btn-download-pdf').addEventListener('click', function () {
            const overlay = document.getElementById('pdf-generating');
            const btn = this;
            btn.disabled = true;
            overlay.classList.add('visible');

            // Switch to light mode for capture
            document.body.classList.add('pdf-export');

            // Small delay so repaint completes before capture
            setTimeout(function () {
                html2pdf()
                    .set({
                        margin:      [12, 14, 12, 14],
                        filename:    'TIME-Coin-Overview-Whitepaper-v4.0.pdf',
                        image:       { type: 'jpeg', quality: 0.97 },
                        html2canvas: {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            logging: false
                        },
                        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' },
                        pagebreak:   { mode: ['avoid-all', 'css', 'legacy'] }
                    })
                    .from(content)
                    .save()
                    .finally(function () {
                        document.body.classList.remove('pdf-export');
                        overlay.classList.remove('visible');
                        btn.disabled = false;
                    });
            }, 100);
        });

    })();
    </script>
</body>
</html>
